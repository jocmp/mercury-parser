ts":{"edges":[],"__typename":"MediaItemToCommentConnection"},"imagesACF":{"agency":"Unsplash","photographer":"Andrey Metelev","fieldGroupName":"imagesACF","thinLine":null,"__typename":"MediaItem_Imagesacf"},"__typename":"MediaItem"},"__typename":"NodeWithFeaturedImageToMediaItemConnectionEdge"},"highlight":"","id":368145,"isFuturePoint":false,"layout":"Default","meta":{"linkCompra":null,"imagemSecundaria":null,"authors":[{"name":"Giovanna Castro","description":null,"slug":"giovanna-castronexojornal-com-br","databaseId":399,"avatar":{"url":"https://secure.gravatar.com/avatar/c42c92a37c09a2d776391d37d431a0929f4686fc45e99e46e15a9a98d4eb77a6?s=96\u0026d=mm\u0026r=g","__typename":"Avatar"},"usersACF":{"avatarImage":null,"__typename":"User_Usersacf"},"__typename":"User"}],"highlight":null,"layout":"Default","references":null,"thinLine":"Biografia será um dos gêneros discutidos n’A Feira do Livro, que acontece em maio. Ao ‘Nexo’, autores falam sobre dificuldades e surpresas ao escrever","relations":{"related":null,"seeMore":[{"__typename":"Story","id":366956,"date":"2026-04-19T23:39:55","slug":"livro-parcelado-consumo-na-periferia-geografo-kaue-lopes-dos-santos","content":"\u003cdiv id=\"attachment_366957\" style=\"width: 610px\" class=\"wp-caption alignnone\"\u003e\u003cimg decoding=\"async\" aria-describedby=\"caption-attachment-366957\" class=\"size-large wp-image-366957\" src=\"https://nexo-uploads-beta.s3.amazonaws.com/wp-content/uploads/images/2026/04/economia_maquina_de_cartao_2907221122-600x359.webp\" alt=\"Pessoa realizando pagamento\" width=\"600\" height=\"359\" data-agency=\"Agência Brasil\" data-photographer=\"Marcello Casal Jr\" data-url-landscape-640=\"https://nexo-uploads-beta.s3.amazonaws.com/wp-content/uploads/images/2026/04/economia_maquina_de_cartao_2907221122-640x399.webp\" srcset=\"https://nexo-uploads-beta.s3.amazonaws.com/wp-content/uploads/images/2026/04/economia_maquina_de_cartao_2907221122-600x359.webp 600w, https://nexo-uploads-beta.s3.amazonaws.com/wp-content/uploads/images/2026/04/economia_maquina_de_cartao_2907221122-277x166.webp 277w, https://nexo-uploads-beta.s3.amazonaws.com/wp-content/uploads/images/2026/04/economia_maquina_de_cartao_2907221122-768x459.webp 768w, https://nexo-uploads-beta.s3.amazonaws.com/wp-content/uploads/images/2026/04/economia_maquina_de_cartao_2907221122.webp 1170w\" sizes=\"(max-width: 600px) 100vw, 600px\" /\u003e\u003cp id=\"caption-attachment-366957\" class=\"wp-caption-text\"\u003ePessoa realizando pagamento\u003c/p\u003e\u003c/div\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eEm 2023, o governo de Luiz Inácio Lula da Silva deu início ao programa Desenrola Brasil, visando a renegociar dívidas de famílias brasileiras. Uma segunda versão da iniciativa deve ser \u003c/span\u003e\u003ca href=\"https://www.nexojornal.com.br/expresso/2026/04/11/aumento-do-endividamento-desenrola-brasil-2026-dividas-altas\" target=\"_blank\" rel=\"noopener\"\u003e\u003cspan style=\"font-weight: 400;\"\u003eanunciada\u003c/span\u003e\u003c/a\u003e\u003cspan style=\"font-weight: 400;\"\u003e em 2026.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan class=\"scores01\"\u003e\u003cb\u003e67%\u003c/b\u003e\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan class=\"scores03\"\u003e\u003cspan style=\"font-weight: 400;\"\u003edos brasileiros dizem \u003ca href=\"https://www.metropoles.com/brasil/datafolha-67-dos-brasileiros-afirmam-ter-dividas-financeiras#goog_rewarded\" target=\"_blank\" rel=\"noopener\"\u003eter dívidas financeiras\u003c/a\u003e, segundo pesquisa Datafolha divulgada no domingo (19)\u003c/span\u003e\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003ePara o geógrafo e pesquisador Kauê Lopes dos Santos, autor de “Parcelado” (Editora Fósforo), as ações do programa funcionam como medidas de curto prazo, que não solucionam estruturalmente o problema, mas garantem a volta das pessoas ao mercado de consumo e de crédito.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eEm “Parcelado”, lançado em 20 de abril, o pesquisador analisou como o acesso ao crédito formal transformou a rotina da população de baixa renda – e de maioria negra – nos bairros Jardim Helena, Brasilândia e Jardim Ângela, em São Paulo.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003e“Procuro defender no livro que o endividamento crônico — que aliena o futuro e dificulta a mobilidade social do sujeito — entra como uma nova variável para essas populações negras nas periferias”, disse o autor ao \u003cstrong\u003eNexo\u003c/strong\u003e.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eNesta entrevista\u003c/span\u003e\u003cspan style=\"font-weight: 400;\"\u003e, o geógrafo falou sobre como o chamado “endividamento crônico” se organiza nas periferias, de que maneira ele é retroalimentado pelo racismo e como famílias têm lidado com o problema, segundo depoimentos colhidos para o livro.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan class=\"interview01\"\u003e\u003cb\u003eComo se deu a expansão da oferta de crédito no Brasil? Quais as particularidades desse processo em relação a outros países? E qual foi o papel do governo nisso?\u003c/b\u003e\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan class=\"interview02\"\u003e\u003cb\u003eKauê Lopes dos Santos\u003c/b\u003e\u003c/span\u003e\u003cspan style=\"font-weight: 400;\"\u003e A construção do mercado de crédito brasileiro, chave para entender o consumo, começou na década de 1990.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eA partir desse momento, tivemos uma série de transformações de caráter macroeconômico – no sistema financeiro nacional e ligadas à \u003c/span\u003e\u003ca href=\"https://www.nexojornal.com.br/explicado/2019/06/30/o-que-foi-o-plano-real-e-como-ele-controlou-a-hiperinflacao\" target=\"_blank\" rel=\"noopener\"\u003e\u003cspan style=\"font-weight: 400;\"\u003eestabilização da moeda\u003c/span\u003e\u003c/a\u003e\u003cspan style=\"font-weight: 400;\"\u003e – e um crescimento, ou uma estabilização, da renda dos trabalhadores.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eIsso permitiu que, em alguma medida, a oferta de crédito para segmentos da população que até então eram desprezados pelo sistema financeiro aumentasse. Esse desprezo era voltado principalmente para a população de baixa renda, que está em uma situação de maior vulnerabilidade, o que aumenta o risco e impacta a taxa de juros ao olharmos para a mesa de crédito – que avalia salário e condições de emprego.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eGradativamente, esse sistema vai se capilarizando, porque percebe que os mais pobres buscam pagar suas dívidas, e diversificando a carteira de crédito. Ao mesmo tempo, há uma articulação muito forte entre o setor varejista – representado por empresas como Casas Bahia, Magazine Luiza e Pernambucanas – e o setor financeiro.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eUma coisa interessante é notar o volume de informação que essas empresas capturam. Elas talvez sejam as instituições que mais conheçam a população e o território brasileiro. Poucas instituições têm a base de dados que eles possuem de renda, organização financeira e atraso de parcelas.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eTodo esse processo é gradual e acompanhado por outros fatores. O consumo via crédito, por exemplo, é estimulado pela obsolescência programada e pela publicidade. O desejo de consumir e a precariedade dos objetos, que chegam ao fim cada vez mais rápido, forçam uma pessoa a comprar novos itens.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eAo mesmo tempo, há novas variáveis, como as \u003c/span\u003e\u003ca href=\"https://www.nexojornal.com.br/servico/2024/09/25/bets-apostas-esportivas-vicio-sinais-ajuda\" target=\"_blank\" rel=\"noopener\"\u003e\u003cspan style=\"font-weight: 400;\"\u003ebets\u003c/span\u003e\u003c/a\u003e\u003cspan style=\"font-weight: 400;\"\u003e, que operam no campo do endividamento, e a informalidade da população, que corre atrás de estratégias de ampliação de renda, sobretudo para pagar as dívidas. Em muitas das entrevistas feitas com trabalhadores, observa-se que é necessário, às vezes, mais de duas jornadas para aumentar o rendimento familiar e pagar a prestação.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan class=\"interview01\"\u003e\u003cb\u003eAté que ponto estratégias como o parcelamento se converteram em inclusão social e aumento do poder aquisitivo?\u003c/b\u003e\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan class=\"interview02\"\u003e\u003cb\u003eKauê Lopes dos Santos \u003c/b\u003e\u003c/span\u003e\u003cspan style=\"font-weight: 400;\"\u003eO termo \u0026#8220;inclusão financeira\u0026#8221; é celebrado nas ciências econômicas – principalmente a partir das experiências do Sudeste Asiático, em que há uma lógica de empréstimo com taxas muito mais baixas –, mas é muito difícil pensá-lo em termos positivos no caso brasileiro. \u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eAqui, nós temos uma estrutura que eu denomino \u0026#8220;capilarização das finanças\u0026#8221;, porque a lógica que passa a organizar o orçamento doméstico e o cotidiano de trabalho dessas pessoas está ligada ao que as finanças e ao que o grande sistema financeiro determinam. \u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eAlém disso, temos taxas de juros que estão entre as mais altas do planeta. \u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eEssas taxas de juros, por sua vez, fazem com que o trabalhador da periferia — que já é prejudicado historicamente pela falta de investimento em infraestrutura e serviços urbanos nos seus bairros — também pague mais pela mesma mercadoria. \u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eO consumo dessas mercadorias melhora as condições de vida. Ter uma televisão, uma geladeira e equipamentos mais atualizados representa qualidade de vida para essa população, que historicamente vive em situações de precariedade de acesso às coisas. \u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eA posse do objeto, simbolicamente e materialmente, representa algo importante para as populações da periferia, que é expropriada de seus direitos mais básicos de acesso à infraestrutura e serviços urbanos, além de ser carregada por uma leitura de ascensão social.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eMas há uma percepção da população de que a situação não está boa, os itens estão caros e, mais do que isso, o orçamento está comprometido com dívidas. Isso é provavelmente um dos fatores que podem definir a eleição e serão endereçados tanto pelo governo quanto pela oposição nos debates eleitorais.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan class=\"interview01\"\u003e\u003cb\u003eO sr. cita no livro o efeito do “endividamento crônico”. No que ele consiste?\u003c/b\u003e\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan class=\"interview02\"\u003e\u003cb\u003eKauê Lopes dos Santos \u003c/b\u003e\u003c/span\u003e\u003cspan style=\"font-weight: 400;\"\u003eA ideia do endividamento crônico está ligada à arquitetura da sociedade de consumo brasileira, que não é igual às outras sociedades de consumo no mundo. Ela também é uma condição que se estrutura não apenas nas periferias de São Paulo, onde fiz minha amostra, mas nas classes médias de São Paulo e em periferias de outras metrópoles.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eA sociedade de consumo é um termo que uso a partir da formulação do sociólogo francês Jean Baudrillard. No caso brasileiro, ela se estrutura a partir de um tripé: obsolescência programada, publicidade e sistema de crédito.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eEsse endividamento é crônico justamente por causa dessas variáveis. O sujeito está sempre se endividando porque ele está sempre consumindo produtos cujos valores são muito maiores que seu orçamento. Esses produtos muitas vezes estragam antes de terminar o pagamento das parcelas, ou porque há o desejo de comprar outro antes de terminar o pagamento.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eProdutos como celulares e televisões estão continuamente sendo otimizados para poder fazer girar a maquinaria da sociedade de consumo. Ao mesmo tempo, o crédito viabiliza isso em parcelas extensas, com taxas de juros elevadíssimas.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan class=\"interview01\"\u003e\u003cb\u003eComo esse efeito se relaciona e se retroalimenta com outras questões, como o racismo e urbanização precária?\u003c/b\u003e\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan class=\"interview02\"\u003e\u003cb\u003eKauê Lopes dos Santos \u003c/b\u003e\u003c/span\u003e\u003cspan style=\"font-weight: 400;\"\u003eSou formado numa tradição de geografia urbana que negligenciou a questão racial no debate, ainda que a questão racial estruture as classes no Brasil, não o contrário.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eNa primeira parte do livro, tive a preocupação de tentar construir uma leitura dessa periferia a partir da dimensão racial. Entender que esses sujeitos na periferia – que têm menos acesso à renda, à oportunidade de emprego de qualidade, ao saneamento básico e à habitação de qualidade – são majoritariamente pretos e pardos.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eHá diferentes linhas que articulam o crédito, o endividamento e a questão racial. Uma delas, exemplificada pelo trabalho do advogado e pesquisador Thiago Amparo, afirma que existe um racismo creditício. Amparo discute estratégias de mesa de crédito e como a leitura desse sujeito precarizado pode entrar nessa discussão.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eIsso acontece porque, no fim das contas, os sujeitos mais precarizados na cidade são sujeitos negros. Para o sistema de crédito, eles são aqueles que apresentam maiores riscos de inadimplência e insolvência. Portanto, esse risco acaba sendo traduzido em taxas de juros mais altas.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eUma matéria recente do jornal Valor Econômico apontou que as mulheres negras são as que \u003c/span\u003e\u003ca href=\"https://valor.globo.com/financas/noticia/2026/04/13/mulheres-negras-de-baixa-renda-pagam-juros-mais-altos-em-emprstimos-mostra-relatrio-do-bc.ghtml\" target=\"_blank\" rel=\"noopener\"\u003e\u003cspan style=\"font-weight: 400;\"\u003emais sofrem\u003c/span\u003e\u003c/a\u003e\u003cspan style=\"font-weight: 400;\"\u003e com taxas de juros altas. Há um argumento de que “não é porque elas são negras”. Mas também é porque elas são negras, porque a sociedade se estrutura racialmente. A classe é informada pela raça, majoritariamente.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eO que tentei trazer na minha pesquisa é a retomada do sociólogo Carlos Hasenbalg, que aborda o “ciclo cumulativo de desvantagens” do negro no Brasil. Essa tese afirma que o sujeito negro está numa sociedade racialmente estruturada, hierarquicamente racista. Logo, ele está sempre sofrendo algum tipo de desvantagem, seja em função de um racismo institucionalizado ou não.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eProcuro defender no livro que o endividamento crônico — que aliena o futuro e dificulta a mobilidade social do sujeito — entra como uma nova variável para essas populações negras nas periferias. A\u003c/span\u003e\u003cspan style=\"font-weight: 400;\"\u003elém do racismo institucional, há uma dificuldade de ascensão social ligada ao endividamento crônico. \u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eIsso porque indivíduos brancos, ainda que também possam vivenciar o endividamento crônico, não estão no campo do ciclo cumulativo de desvantagens. É importante que o sujeito negro na periferia consiga consumir, mas, no caso dele, a condição de endividamento estará associada a uma precarização do trabalho, por exemplo.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan class=\"interview01\"\u003e\u003cb\u003eComo o sr. avalia os efeitos dessa lógica de consumo sobre as famílias que entrevistou? Quais as percepções?\u003c/b\u003e\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan class=\"interview02\"\u003e\u003cb\u003eKauê Lopes dos Santos \u003c/b\u003e\u003c/span\u003e\u003cspan style=\"font-weight: 400;\"\u003eAo longo do tempo, fui percebendo uma espécie de absorção dessa cronicidade, que se torna quase uma variável fixa na organização do orçamento e estimula o aumento da informalidade em muitos casos.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eMuitas vezes, para pagar as parcelas de coisas que são importantes socialmente para uma pessoa, como uma nova televisão, ela precisa ampliar a atuação no campo da informalidade – trabalhando como motorista de aplicativo ou vendendo bolos, por exemplo.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eJá no caso do emprego formal, o sujeito começa a triplicar a jornada de trabalho, ou a trabalhar no fim de semana, para complementar a renda.  Isso gera uma periferia de trabalhadores exaustos.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eEssa situação ganha novos contornos hoje. Uma pessoa pode ter 24 ou 48 meses de vida comprometidos pelo endividamento. Ela, então, encontra duas saídas: ou aumentar a jornada de trabalho ou começar a \u003c/span\u003e\u003ca href=\"https://www.nexojornal.com.br/podcast/2024/07/03/jogo-do-tigrinho-polemicas\" target=\"_blank\" rel=\"noopener\"\u003e\u003cspan style=\"font-weight: 400;\"\u003ejogar no “tigrinho”\u003c/span\u003e\u003c/a\u003e\u003cspan style=\"font-weight: 400;\"\u003e. Mas logo percebe que isso, além de viciar, gera perda de dinheiro; então a alternativa será entrar no cheque especial, entrar nas outras modalidades de crédito para resolver aquela situação momentânea, que, na verdade, não é momentânea.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan class=\"interview01\"\u003e\u003cb\u003eÉ possível alterar essa lógica, favorecendo o poder aquisitivo e reduzindo efeitos colaterais? Quanto disso cabe às próprias famílias e quanto cabe aos setores econômicos ou ao próprio governo?\u003c/b\u003e\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan class=\"interview02\"\u003e\u003cb\u003eKauê Lopes dos Santos \u003c/b\u003e\u003c/span\u003e\u003cspan style=\"font-weight: 400;\"\u003eAcho que temos que pensar nas lógicas de curto, médio e longo prazo. Essas duas últimas exigem que pensemos em como queremos viver em sociedade.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003ePara o curto prazo, podemos pensar em duas estratégias: redução de taxas de juros e educação financeira nas escolas. Mas isso precisa ser endereçado como uma questão de curto prazo. O governo tem pensado nas políticas do Desenrola 1, talvez Desenrola 2, como estratégias pontuais, mas elas não resolvem. Tanto que, do último Desenrola até agora, 9 milhões de brasileiros \u003c/span\u003e\u003ca href=\"https://www.cnnbrasil.com.br/economia/macroeconomia/brasil-registrou-9-milhoes-de-novos-inadimplentes-apos-fim-do-desenrola/\" target=\"_blank\" rel=\"noopener\"\u003e\u003cspan style=\"font-weight: 400;\"\u003evoltaram\u003c/span\u003e\u003c/a\u003e\u003cspan style=\"font-weight: 400;\"\u003e à situação de inadimplência.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eNo campo da educação financeira, nós precisamos explicar o sistema financeiro, o sistema de juros. É preciso informar a sociedade sobre como o sistema financeiro nacional opera, senão, a questão recai nas atitudes individuais de uma pessoa que “precisa aprender a controlar seus gastos”. É preciso entender que os indivíduos estão pagando taxas de juros abusivas e a cada ano o sistema financeiro bate recordes.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003ePara situações de médio e longo prazo, precisamos pensar na questão da publicidade e da obsolescência programada. Esse último ponto pode ser redimensionado legislativamente em função de pensar o tempo da garantia do objeto, ou em termos do design do objeto.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan class=\"interview01\"\u003e\u003cb\u003eMas dentro do contexto eleitoral e uma preocupação com a questão do endividamento, o governo tem sinalizado que vai apostar justamente em uma nova versão do Desenrola. Na sua avaliação, isso seria positivo? \u003c/b\u003e\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan class=\"interview02\"\u003e\u003cb\u003eKauê Lopes dos Santos \u003c/b\u003e\u003c/span\u003e\u003cspan style=\"font-weight: 400;\"\u003eAcredito que é positivo como uma maneira de resolver o problema das famílias. Não podemos perder de vista que essa política objetivamente vai melhorar a vida do sujeito na periferia, de baixa renda.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eEu poderia falar que esse programa não adianta, porque, na verdade, o problema estrutural é um fluxo de dívida, o endividamento é crônico e vai seguir, mas não podemos ignorar o agora.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eQuando você resolve o problema no Desenrola, há a garantia da volta desse sujeito ao mercado de consumo e ao mercado de crédito. A situação é resolvida pontualmente, não estruturalmente.\u003c/span\u003e\u003c/p\u003e\n\u003cdiv id=\"code-type\"\u003e\u003ciframe src=\"https://graficos-2.s3.sa-east-1.amazonaws.com/assets/pebio/pebio-feira-livro.html\" width=\"100%\" height=\"110\" frameborder=\"0\" scrolling=\"no\" style=\"display:block;border:none;\"\u003e\u003c/iframe\u003e\u003c/div\u003e\n","title":"‘Endividamento, crédito e racismo estão interligados’","section":{"edges":[{"isPrimary":true,"node":{"name":"Entrevista","slug":"entrevista","__typename":"Section"},"__typename":"StoryToSectionConnectionEdge"}],"__typename":"StoryToSectionConnection"},"tags":{"edges":[{"node":{"slug":"brasil","name":"Brasil","__typename":"Tag"},"__typename":"StoryToTagConnectionEdge"},{"node":{"slug":"economia","name":"Economia","__typename":"Tag"},"__typename":"StoryToTagConnectionEdge"},{"node":{"slug":"sociedade","name":"Sociedade","__typename":"Tag"},"__typename":"StoryToTagConnectionEdge"}],"__typename":"StoryToTagConnection"}}],"__typename":"Story_Storyacf_Relations"},"quiz":{"hasQuiz":null,"quizItem":null,"__typename":"Story_Storyacf_Quiz"},"keywords":"biografia, feira do livro, cultura, literatura, gênero, joão pombo barile, adriana negreiros, bianca santana","__typename":"Story_Storyacf"},"references":"","related":[{"content":"\u003cdiv id=\"attachment_366957\" style=\"width: 610px\" class=\"wp-caption alignnone\"\u003e\u003cimg decoding=\"async\" aria-describedby=\"caption-attachment-366957\" class=\"size-large wp-image-366957\" src=\"https://nexo-uploads-beta.s3.amazonaws.com/wp-content/uploads/images/2026/04/economia_maquina_de_cartao_2907221122-600x359.webp\" alt=\"Pessoa realizando pagamento\" width=\"600\" height=\"359\" data-agency=\"Agência Brasil\" data-photographer=\"Marcello Casal Jr\" data-url-landscape-640=\"https://nexo-uploads-beta.s3.amazonaws.com/wp-content/uploads/images/2026/04/economia_maquina_de_cartao_2907221122-640x399.webp\" srcset=\"https://nexo-uploads-beta.s3.amazonaws.com/wp-content/uploads/images/2026/04/economia_maquina_de_cartao_2907221122-600x359.webp 600w, https://nexo-uploads-beta.s3.amazonaws.com/wp-content/uploads/images/2026/04/economia_maquina_de_cartao_2907221122-277x166.webp 277w, https://nexo-uploads-beta.s3.amazonaws.com/wp-content/uploads/images/2026/04/economia_maquina_de_cartao_2907221122-768x459.webp 768w, https://nexo-uploads-beta.s3.amazonaws.com/wp-content/uploads/images/2026/04/economia_maquina_de_cartao_2907221122.webp 1170w\" sizes=\"(max-width: 600px) 100vw, 600px\" /\u003e\u003cp id=\"caption-attachment-366957\" class=\"wp-caption-text\"\u003ePessoa realizando pagamento\u003c/p\u003e\u003c/div\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eEm 2023, o governo de Luiz Inácio Lula da Silva deu início ao programa Desenrola Brasil, visando a renegociar dívidas de famílias brasileiras. Uma segunda versão da iniciativa deve ser \u003c/span\u003e\u003ca href=\"https://www.nexojornal.com.br/expresso/2026/04/11/aumento-do-endividamento-desenrola-brasil-2026-dividas-altas\" target=\"_blank\" rel=\"noopener\"\u003e\u003cspan style=\"font-weight: 400;\"\u003eanunciada\u003c/span\u003e\u003c/a\u003e\u003cspan style=\"font-weight: 400;\"\u003e em 2026.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan class=\"scores01\"\u003e\u003cb\u003e67%\u003c/b\u003e\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan class=\"scores03\"\u003e\u003cspan style=\"font-weight: 400;\"\u003edos brasileiros dizem \u003ca href=\"https://www.metropoles.com/brasil/datafolha-67-dos-brasileiros-afirmam-ter-dividas-financeiras#goog_rewarded\" target=\"_blank\" rel=\"noopener\"\u003eter dívidas financeiras\u003c/a\u003e, segundo pesquisa Datafolha divulgada no domingo (19)\u003c/span\u003e\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003ePara o geógrafo e pesquisador Kauê Lopes dos Santos, autor de “Parcelado” (Editora Fósforo), as ações do programa funcionam como medidas de curto prazo, que não solucionam estruturalmente o problema, mas garantem a volta das pessoas ao mercado de consumo e de crédito.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eEm “Parcelado”, lançado em 20 de abril, o pesquisador analisou como o acesso ao crédito formal transformou a rotina da população de baixa renda – e de maioria negra – nos bairros Jardim Helena, Brasilândia e Jardim Ângela, em São Paulo.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003e“Procuro defender no livro que o endividamento crônico — que aliena o futuro e dificulta a mobilidade social do sujeito — entra como uma nova variável para essas populações negras nas periferias”, disse o autor ao \u003cstrong\u003eNexo\u003c/strong\u003e.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eNesta entrevista\u003c/span\u003e\u003cspan style=\"font-weight: 400;\"\u003e, o geógrafo falou sobre como o chamado “endividamento crônico” se organiza nas periferias, de que maneira ele é retroalimentado pelo racismo e como famílias têm lidado com o problema, segundo depoimentos colhidos para o livro.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan class=\"interview01\"\u003e\u003cb\u003eComo se deu a expansão da oferta de crédito no Brasil? Quais as particularidades desse processo em relação a outros países? E qual foi o papel do governo nisso?\u003c/b\u003e\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan class=\"interview02\"\u003e\u003cb\u003eKauê Lopes dos Santos\u003c/b\u003e\u003c/span\u003e\u003cspan style=\"font-weight: 400;\"\u003e A construção do mercado de crédito brasileiro, chave para entender o consumo, começou na década de 1990.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eA partir desse momento, tivemos uma série de transformações de caráter macroeconômico – no sistema financeiro nacional e ligadas à \u003c/span\u003e\u003ca href=\"https://www.nexojornal.com.br/explicado/2019/06/30/o-que-foi-o-plano-real-e-como-ele-controlou-a-hiperinflacao\" target=\"_blank\" rel=\"noopener\"\u003e\u003cspan style=\"font-weight: 400;\"\u003eestabilização da moeda\u003c/span\u003e\u003c/a\u003e\u003cspan style=\"font-weight: 400;\"\u003e – e um crescimento, ou uma estabilização, da renda dos trabalhadores.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eIsso permitiu que, em alguma medida, a oferta de crédito para segmentos da população que até então eram desprezados pelo sistema financeiro aumentasse. Esse desprezo era voltado principalmente para a população de baixa renda, que está em uma situação de maior vulnerabilidade, o que aumenta o risco e impacta a taxa de juros ao olharmos para a mesa de crédito – que avalia salário e condições de emprego.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eGradativamente, esse sistema vai se capilarizando, porque percebe que os mais pobres buscam pagar suas dívidas, e diversificando a carteira de crédito. Ao mesmo tempo, há uma articulação muito forte entre o setor varejista – representado por empresas como Casas Bahia, Magazine Luiza e Pernambucanas – e o setor financeiro.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eUma coisa interessante é notar o volume de informação que essas empresas capturam. Elas talvez sejam as instituições que mais conheçam a população e o território brasileiro. Poucas instituições têm a base de dados que eles possuem de renda, organização financeira e atraso de parcelas.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eTodo esse processo é gradual e acompanhado por outros fatores. O consumo via crédito, por exemplo, é estimulado pela obsolescência programada e pela publicidade. O desejo de consumir e a precariedade dos objetos, que chegam ao fim cada vez mais rápido, forçam uma pessoa a comprar novos itens.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eAo mesmo tempo, há novas variáveis, como as \u003c/span\u003e\u003ca href=\"https://www.nexojornal.com.br/servico/2024/09/25/bets-apostas-esportivas-vicio-sinais-ajuda\" target=\"_blank\" rel=\"noopener\"\u003e\u003cspan style=\"font-weight: 400;\"\u003ebets\u003c/span\u003e\u003c/a\u003e\u003cspan style=\"font-weight: 400;\"\u003e, que operam no campo do endividamento, e a informalidade da população, que corre atrás de estratégias de ampliação de renda, sobretudo para pagar as dívidas. Em muitas das entrevistas feitas com trabalhadores, observa-se que é necessário, às vezes, mais de duas jornadas para aumentar o rendimento familiar e pagar a prestação.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan class=\"interview01\"\u003e\u003cb\u003eAté que ponto estratégias como o parcelamento se converteram em inclusão social e aumento do poder aquisitivo?\u003c/b\u003e\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan class=\"interview02\"\u003e\u003cb\u003eKauê Lopes dos Santos \u003c/b\u003e\u003c/span\u003e\u003cspan style=\"font-weight: 400;\"\u003eO termo \u0026#8220;inclusão financeira\u0026#8221; é celebrado nas ciências econômicas – principalmente a partir das experiências do Sudeste Asiático, em que há uma lógica de empréstimo com taxas muito mais baixas –, mas é muito difícil pensá-lo em termos positivos no caso brasileiro. \u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eAqui, nós temos uma estrutura que eu denomino \u0026#8220;capilarização das finanças\u0026#8221;, porque a lógica que passa a organizar o orçamento doméstico e o cotidiano de trabalho dessas pessoas está ligada ao que as finanças e ao que o grande sistema financeiro determinam. \u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eAlém disso, temos taxas de juros que estão entre as mais altas do planeta. \u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eEssas taxas de juros, por sua vez, fazem com que o trabalhador da periferia — que já é prejudicado historicamente pela falta de investimento em infraestrutura e serviços urbanos nos seus bairros — também pague mais pela mesma mercadoria. \u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eO consumo dessas mercadorias melhora as condições de vida. Ter uma televisão, uma geladeira e equipamentos mais atualizados representa qualidade de vida para essa população, que historicamente vive em situações de precariedade de acesso às coisas. \u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eA posse do objeto, simbolicamente e materialmente, representa algo importante para as populações da periferia, que é expropriada de seus direitos mais básicos de acesso à infraestrutura e serviços urbanos, além de ser carregada por uma leitura de ascensão social.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eMas há uma percepção da população de que a situação não está boa, os itens estão caros e, mais do que isso, o orçamento está comprometido com dívidas. Isso é provavelmente um dos fatores que podem definir a eleição e serão endereçados tanto pelo governo quanto pela oposição nos debates eleitorais.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan class=\"interview01\"\u003e\u003cb\u003eO sr. cita no livro o efeito do “endividamento crônico”. No que ele consiste?\u003c/b\u003e\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan class=\"interview02\"\u003e\u003cb\u003eKauê Lopes dos Santos \u003c/b\u003e\u003c/span\u003e\u003cspan style=\"font-weight: 400;\"\u003eA ideia do endividamento crônico está ligada à arquitetura da sociedade de consumo brasileira, que não é igual às outras sociedades de consumo no mundo. Ela também é uma condição que se estrutura não apenas nas periferias de São Paulo, onde fiz minha amostra, mas nas classes médias de São Paulo e em periferias de outras metrópoles.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eA sociedade de consumo é um termo que uso a partir da formulação do sociólogo francês Jean Baudrillard. No caso brasileiro, ela se estrutura a partir de um tripé: obsolescência programada, publicidade e sistema de crédito.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eEsse endividamento é crônico justamente por causa dessas variáveis. O sujeito está sempre se endividando porque ele está sempre consumindo produtos cujos valores são muito maiores que seu orçamento. Esses produtos muitas vezes estragam antes de terminar o pagamento das parcelas, ou porque há o desejo de comprar outro antes de terminar o pagamento.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eProdutos como celulares e televisões estão continuamente sendo otimizados para poder fazer girar a maquinaria da sociedade de consumo. Ao mesmo tempo, o crédito viabiliza isso em parcelas extensas, com taxas de juros elevadíssimas.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan class=\"interview01\"\u003e\u003cb\u003eComo esse efeito se relaciona e se retroalimenta com outras questões, como o racismo e urbanização precária?\u003c/b\u003e\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan class=\"interview02\"\u003e\u003cb\u003eKauê Lopes dos Santos \u003c/b\u003e\u003c/span\u003e\u003cspan style=\"font-weight: 400;\"\u003eSou formado numa tradição de geografia urbana que negligenciou a questão racial no debate, ainda que a questão racial estruture as classes no Brasil, não o contrário.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eNa primeira parte do livro, tive a preocupação de tentar construir uma leitura dessa periferia a partir da dimensão racial. Entender que esses sujeitos na periferia – que têm menos acesso à renda, à oportunidade de emprego de qualidade, ao saneamento básico e à habitação de qualidade – são majoritariamente pretos e pardos.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eHá diferentes linhas que articulam o crédito, o endividamento e a questão racial. Uma delas, exemplificada pelo trabalho do advogado e pesquisador Thiago Amparo, afirma que existe um racismo creditício. Amparo discute estratégias de mesa de crédito e como a leitura desse sujeito precarizado pode entrar nessa discussão.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eIsso acontece porque, no fim das contas, os sujeitos mais precarizados na cidade são sujeitos negros. Para o sistema de crédito, eles são aqueles que apresentam maiores riscos de inadimplência e insolvência. Portanto, esse risco acaba sendo traduzido em taxas de juros mais altas.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eUma matéria recente do jornal Valor Econômico apontou que as mulheres negras são as que \u003c/span\u003e\u003ca href=\"https://valor.globo.com/financas/noticia/2026/04/13/mulheres-negras-de-baixa-renda-pagam-juros-mais-altos-em-emprstimos-mostra-relatrio-do-bc.ghtml\" target=\"_blank\" rel=\"noopener\"\u003e\u003cspan style=\"font-weight: 400;\"\u003emais sofrem\u003c/span\u003e\u003c/a\u003e\u003cspan style=\"font-weight: 400;\"\u003e com taxas de juros altas. Há um argumento de que “não é porque elas são negras”. Mas também é porque elas são negras, porque a sociedade se estrutura racialmente. A classe é informada pela raça, majoritariamente.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eO que tentei trazer na minha pesquisa é a retomada do sociólogo Carlos Hasenbalg, que aborda o “ciclo cumulativo de desvantagens” do negro no Brasil. Essa tese afirma que o sujeito negro está numa sociedade racialmente estruturada, hierarquicamente racista. Logo, ele está sempre sofrendo algum tipo de desvantagem, seja em função de um racismo institucionalizado ou não.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eProcuro defender no livro que o endividamento crônico — que aliena o futuro e dificulta a mobilidade social do sujeito — entra como uma nova variável para essas populações negras nas periferias. A\u003c/span\u003e\u003cspan style=\"font-weight: 400;\"\u003elém do racismo institucional, há uma dificuldade de ascensão social ligada ao endividamento crônico. \u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eIsso porque indivíduos brancos, ainda que também possam vivenciar o endividamento crônico, não estão no campo do ciclo cumulativo de desvantagens. É importante que o sujeito negro na periferia consiga consumir, mas, no caso dele, a condição de endividamento estará associada a uma precarização do trabalho, por exemplo.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan class=\"interview01\"\u003e\u003cb\u003eComo o sr. avalia os efeitos dessa lógica de consumo sobre as famílias que entrevistou? Quais as percepções?\u003c/b\u003e\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan class=\"interview02\"\u003e\u003cb\u003eKauê Lopes dos Santos \u003c/b\u003e\u003c/span\u003e\u003cspan style=\"font-weight: 400;\"\u003eAo longo do tempo, fui percebendo uma espécie de absorção dessa cronicidade, que se torna quase uma variável fixa na organização do orçamento e estimula o aumento da informalidade em muitos casos.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eMuitas vezes, para pagar as parcelas de coisas que são importantes socialmente para uma pessoa, como uma nova televisão, ela precisa ampliar a atuação no campo da informalidade – trabalhando como motorista de aplicativo ou vendendo bolos, por exemplo.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eJá no caso do emprego formal, o sujeito começa a triplicar a jornada de trabalho, ou a trabalhar no fim de semana, para complementar a renda.  Isso gera uma periferia de trabalhadores exaustos.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eEssa situação ganha novos contornos hoje. Uma pessoa pode ter 24 ou 48 meses de vida comprometidos pelo endividamento. Ela, então, encontra duas saídas: ou aumentar a jornada de trabalho ou começar a \u003c/span\u003e\u003ca href=\"https://www.nexojornal.com.br/podcast/2024/07/03/jogo-do-tigrinho-polemicas\" target=\"_blank\" rel=\"noopener\"\u003e\u003cspan style=\"font-weight: 400;\"\u003ejogar no “tigrinho”\u003c/span\u003e\u003c/a\u003e\u003cspan style=\"font-weight: 400;\"\u003e. Mas logo percebe que isso, além de viciar, gera perda de dinheiro; então a alternativa será entrar no cheque especial, entrar nas outras modalidades de crédito para resolver aquela situação momentânea, que, na verdade, não é momentânea.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan class=\"interview01\"\u003e\u003cb\u003eÉ possível alterar essa lógica, favorecendo o poder aquisitivo e reduzindo efeitos colaterais? Quanto disso cabe às próprias famílias e quanto cabe aos setores econômicos ou ao próprio governo?\u003c/b\u003e\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan class=\"interview02\"\u003e\u003cb\u003eKauê Lopes dos Santos \u003c/b\u003e\u003c/span\u003e\u003cspan style=\"font-weight: 400;\"\u003eAcho que temos que pensar nas lógicas de curto, médio e longo prazo. Essas duas últimas exigem que pensemos em como queremos viver em sociedade.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003ePara o curto prazo, podemos pensar em duas estratégias: redução de taxas de juros e educação financeira nas escolas. Mas isso precisa ser endereçado como uma questão de curto prazo. O governo tem pensado nas políticas do Desenrola 1, talvez Desenrola 2, como estratégias pontuais, mas elas não resolvem. Tanto que, do último Desenrola até agora, 9 milhões de brasileiros \u003c/span\u003e\u003ca href=\"https://www.cnnbrasil.com.br/economia/macroeconomia/brasil-registrou-9-milhoes-de-novos-inadimplentes-apos-fim-do-desenrola/\" target=\"_blank\" rel=\"noopener\"\u003e\u003cspan style=\"font-weight: 400;\"\u003evoltaram\u003c/span\u003e\u003c/a\u003e\u003cspan style=\"font-weight: 400;\"\u003e à situação de inadimplência.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eNo campo da educação financeira, nós precisamos explicar o sistema financeiro, o sistema de juros. É preciso informar a sociedade sobre como o sistema financeiro nacional opera, senão, a questão recai nas atitudes individuais de uma pessoa que “precisa aprender a controlar seus gastos”. É preciso entender que os indivíduos estão pagando taxas de juros abusivas e a cada ano o sistema financeiro bate recordes.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003ePara situações de médio e longo prazo, precisamos pensar na questão da publicidade e da obsolescência programada. Esse último ponto pode ser redimensionado legislativamente em função de pensar o tempo da garantia do objeto, ou em termos do design do objeto.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan class=\"interview01\"\u003e\u003cb\u003eMas dentro do contexto eleitoral e uma preocupação com a questão do endividamento, o governo tem sinalizado que vai apostar justamente em uma nova versão do Desenrola. Na sua avaliação, isso seria positivo? \u003c/b\u003e\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan class=\"interview02\"\u003e\u003cb\u003eKauê Lopes dos Santos \u003c/b\u003e\u003c/span\u003e\u003cspan style=\"font-weight: 400;\"\u003eAcredito que é positivo como uma maneira de resolver o problema das famílias. Não podemos perder de vista que essa política objetivamente vai melhorar a vida do sujeito na periferia, de baixa renda.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eEu poderia falar que esse programa não adianta, porque, na verdade, o problema estrutural é um fluxo de dívida, o endividamento é crônico e vai seguir, mas não podemos ignorar o agora.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eQuando você resolve o problema no Desenrola, há a garantia da volta desse sujeito ao mercado de consumo e ao mercado de crédito. A situação é resolvida pontualmente, não estruturalmente.\u003c/span\u003e\u003c/p\u003e\n\u003cdiv id=\"code-type\"\u003e\u003ciframe src=\"https://graficos-2.s3.sa-east-1.amazonaws.com/assets/pebio/pebio-feira-livro.html\" width=\"100%\" height=\"110\" frameborder=\"0\" scrolling=\"no\" style=\"display:block;border:none;\"\u003e\u003c/iframe\u003e\u003c/div\u003e\n","date":"2026//04/19","id":366956,"sections":[{"isPrimary":true,"node":{"name":"Entrevista","slug":"entrevista"}}],"section":[],"slug":"livro-parcelado-consumo-na-periferia-geografo-kaue-lopes-dos-santos","title":"‘Endividamento, crédito e racismo estão interligados’","tags":{"edges":[{"node":{"slug":"brasil","name":"Brasil","__typename":"Tag"},"__typename":"StoryToTagConnectionEdge"},{"node":{"slug":"economia","name":"Economia","__typename":"Tag"},"__typename":"StoryToTagConnectionEdge"},{"node":{"slug":"sociedade","name":"Sociedade","__typename":"Tag"},"__typename":"StoryToTagConnectionEdge"}],"__typename":"StoryToTagConnection"}}],"sections":[{"isPrimary":true,"node":{"slug":"expresso","name":"Expresso","__typename":"Section"},"__typename":"StoryToSectionConnectionEdge"}],"seeMore":[{"content":"\u003cdiv id=\"attachment_366957\" style=\"width: 610px\" class=\"wp-caption alignnone\"\u003e\u003cimg decoding=\"async\" aria-describedby=\"caption-attachment-366957\" class=\"size-large wp-image-366957\" src=\"https://nexo-uploads-beta.s3.amazonaws.com/wp-content/uploads/images/2026/04/economia_maquina_de_cartao_2907221122-600x359.webp\" alt=\"Pessoa realizando pagamento\" width=\"600\" height=\"359\" data-agency=\"Agência Brasil\" data-photographer=\"Marcello Casal Jr\" data-url-landscape-640=\"https://nexo-uploads-beta.s3.amazonaws.com/wp-content/uploads/images/2026/04/economia_maquina_de_cartao_2907221122-640x399.webp\" srcset=\"https://nexo-uploads-beta.s3.amazonaws.com/wp-content/uploads/images/2026/04/economia_maquina_de_cartao_2907221122-600x359.webp 600w, https://nexo-uploads-beta.s3.amazonaws.com/wp-content/uploads/images/2026/04/economia_maquina_de_cartao_2907221122-277x166.webp 277w, https://nexo-uploads-beta.s3.amazonaws.com/wp-content/uploads/images/2026/04/economia_maquina_de_cartao_2907221122-768x459.webp 768w, https://nexo-uploads-beta.s3.amazonaws.com/wp-content/uploads/images/2026/04/economia_maquina_de_cartao_2907221122.webp 1170w\" sizes=\"(max-width: 600px) 100vw, 600px\" /\u003e\u003cp id=\"caption-attachment-366957\" class=\"wp-caption-text\"\u003ePessoa realizando pagamento\u003c/p\u003e\u003c/div\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eEm 2023, o governo de Luiz Inácio Lula da Silva deu início ao programa Desenrola Brasil, visando a renegociar dívidas de famílias brasileiras. Uma segunda versão da iniciativa deve ser \u003c/span\u003e\u003ca href=\"https://www.nexojornal.com.br/expresso/2026/04/11/aumento-do-endividamento-desenrola-brasil-2026-dividas-altas\" target=\"_blank\" rel=\"noopener\"\u003e\u003cspan style=\"font-weight: 400;\"\u003eanunciada\u003c/span\u003e\u003c/a\u003e\u003cspan style=\"font-weight: 400;\"\u003e em 2026.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan class=\"scores01\"\u003e\u003cb\u003e67%\u003c/b\u003e\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan class=\"scores03\"\u003e\u003cspan style=\"font-weight: 400;\"\u003edos brasileiros dizem \u003ca href=\"https://www.metropoles.com/brasil/datafolha-67-dos-brasileiros-afirmam-ter-dividas-financeiras#goog_rewarded\" target=\"_blank\" rel=\"noopener\"\u003eter dívidas financeiras\u003c/a\u003e, segundo pesquisa Datafolha divulgada no domingo (19)\u003c/span\u003e\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003ePara o geógrafo e pesquisador Kauê Lopes dos Santos, autor de “Parcelado” (Editora Fósforo), as ações do programa funcionam como medidas de curto prazo, que não solucionam estruturalmente o problema, mas garantem a volta das pessoas ao mercado de consumo e de crédito.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eEm “Parcelado”, lançado em 20 de abril, o pesquisador analisou como o acesso ao crédito formal transformou a rotina da população de baixa renda – e de maioria negra – nos bairros Jardim Helena, Brasilândia e Jardim Ângela, em São Paulo.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003e“Procuro defender no livro que o endividamento crônico — que aliena o futuro e dificulta a mobilidade social do sujeito — entra como uma nova variável para essas populações negras nas periferias”, disse o autor ao \u003cstrong\u003eNexo\u003c/strong\u003e.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eNesta entrevista\u003c/span\u003e\u003cspan style=\"font-weight: 400;\"\u003e, o geógrafo falou sobre como o chamado “endividamento crônico” se organiza nas periferias, de que maneira ele é retroalimentado pelo racismo e como famílias têm lidado com o problema, segundo depoimentos colhidos para o livro.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan class=\"interview01\"\u003e\u003cb\u003eComo se deu a expansão da oferta de crédito no Brasil? Quais as particularidades desse processo em relação a outros países? E qual foi o papel do governo nisso?\u003c/b\u003e\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan class=\"interview02\"\u003e\u003cb\u003eKauê Lopes dos Santos\u003c/b\u003e\u003c/span\u003e\u003cspan style=\"font-weight: 400;\"\u003e A construção do mercado de crédito brasileiro, chave para entender o consumo, começou na década de 1990.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eA partir desse momento, tivemos uma série de transformações de caráter macroeconômico – no sistema financeiro nacional e ligadas à \u003c/span\u003e\u003ca href=\"https://www.nexojornal.com.br/explicado/2019/06/30/o-que-foi-o-plano-real-e-como-ele-controlou-a-hiperinflacao\" target=\"_blank\" rel=\"noopener\"\u003e\u003cspan style=\"font-weight: 400;\"\u003eestabilização da moeda\u003c/span\u003e\u003c/a\u003e\u003cspan style=\"font-weight: 400;\"\u003e – e um crescimento, ou uma estabilização, da renda dos trabalhadores.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eIsso permitiu que, em alguma medida, a oferta de crédito para segmentos da população que até então eram desprezados pelo sistema financeiro aumentasse. Esse desprezo era voltado principalmente para a população de baixa renda, que está em uma situação de maior vulnerabilidade, o que aumenta o risco e impacta a taxa de juros ao olharmos para a mesa de crédito – que avalia salário e condições de emprego.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eGradativamente, esse sistema vai se capilarizando, porque percebe que os mais pobres buscam pagar suas dívidas, e diversificando a carteira de crédito. Ao mesmo tempo, há uma articulação muito forte entre o setor varejista – representado por empresas como Casas Bahia, Magazine Luiza e Pernambucanas – e o setor financeiro.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eUma coisa interessante é notar o volume de informação que essas empresas capturam. Elas talvez sejam as instituições que mais conheçam a população e o território brasileiro. Poucas instituições têm a base de dados que eles possuem de renda, organização financeira e atraso de parcelas.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eTodo esse processo é gradual e acompanhado por outros fatores. O consumo via crédito, por exemplo, é estimulado pela obsolescência programada e pela publicidade. O desejo de consumir e a precariedade dos objetos, que chegam ao fim cada vez mais rápido, forçam uma pessoa a comprar novos itens.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eAo mesmo tempo, há novas variáveis, como as \u003c/span\u003e\u003ca href=\"https://www.nexojornal.com.br/servico/2024/09/25/bets-apostas-esportivas-vicio-sinais-ajuda\" target=\"_blank\" rel=\"noopener\"\u003e\u003cspan style=\"font-weight: 400;\"\u003ebets\u003c/span\u003e\u003c/a\u003e\u003cspan style=\"font-weight: 400;\"\u003e, que operam no campo do endividamento, e a informalidade da população, que corre atrás de estratégias de ampliação de renda, sobretudo para pagar as dívidas. Em muitas das entrevistas feitas com trabalhadores, observa-se que é necessário, às vezes, mais de duas jornadas para aumentar o rendimento familiar e pagar a prestação.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan class=\"interview01\"\u003e\u003cb\u003eAté que ponto estratégias como o parcelamento se converteram em inclusão social e aumento do poder aquisitivo?\u003c/b\u003e\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan class=\"interview02\"\u003e\u003cb\u003eKauê Lopes dos Santos \u003c/b\u003e\u003c/span\u003e\u003cspan style=\"font-weight: 400;\"\u003eO termo \u0026#8220;inclusão financeira\u0026#8221; é celebrado nas ciências econômicas – principalmente a partir das experiências do Sudeste Asiático, em que há uma lógica de empréstimo com taxas muito mais baixas –, mas é muito difícil pensá-lo em termos positivos no caso brasileiro. \u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eAqui, nós temos uma estrutura que eu denomino \u0026#8220;capilarização das finanças\u0026#8221;, porque a lógica que passa a organizar o orçamento doméstico e o cotidiano de trabalho dessas pessoas está ligada ao que as finanças e ao que o grande sistema financeiro determinam. \u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eAlém disso, temos taxas de juros que estão entre as mais altas do planeta. \u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eEssas taxas de juros, por sua vez, fazem com que o trabalhador da periferia — que já é prejudicado historicamente pela falta de investimento em infraestrutura e serviços urbanos nos seus bairros — também pague mais pela mesma mercadoria. \u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eO consumo dessas mercadorias melhora as condições de vida. Ter uma televisão, uma geladeira e equipamentos mais atualizados representa qualidade de vida para essa população, que historicamente vive em situações de precariedade de acesso às coisas. \u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eA posse do objeto, simbolicamente e materialmente, representa algo importante para as populações da periferia, que é expropriada de seus direitos mais básicos de acesso à infraestrutura e serviços urbanos, além de ser carregada por uma leitura de ascensão social.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eMas há uma percepção da população de que a situação não está boa, os itens estão caros e, mais do que isso, o orçamento está comprometido com dívidas. Isso é provavelmente um dos fatores que podem definir a eleição e serão endereçados tanto pelo governo quanto pela oposição nos debates eleitorais.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan class=\"interview01\"\u003e\u003cb\u003eO sr. cita no livro o efeito do “endividamento crônico”. No que ele consiste?\u003c/b\u003e\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan class=\"interview02\"\u003e\u003cb\u003eKauê Lopes dos Santos \u003c/b\u003e\u003c/span\u003e\u003cspan style=\"font-weight: 400;\"\u003eA ideia do endividamento crônico está ligada à arquitetura da sociedade de consumo brasileira, que não é igual às outras sociedades de consumo no mundo. Ela também é uma condição que se estrutura não apenas nas periferias de São Paulo, onde fiz minha amostra, mas nas classes médias de São Paulo e em periferias de outras metrópoles.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eA sociedade de consumo é um termo que uso a partir da formulação do sociólogo francês Jean Baudrillard. No caso brasileiro, ela se estrutura a partir de um tripé: obsolescência programada, publicidade e sistema de crédito.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eEsse endividamento é crônico justamente por causa dessas variáveis. O sujeito está sempre se endividando porque ele está sempre consumindo produtos cujos valores são muito maiores que seu orçamento. Esses produtos muitas vezes estragam antes de terminar o pagamento das parcelas, ou porque há o desejo de comprar outro antes de terminar o pagamento.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eProdutos como celulares e televisões estão continuamente sendo otimizados para poder fazer girar a maquinaria da sociedade de consumo. Ao mesmo tempo, o crédito viabiliza isso em parcelas extensas, com taxas de juros elevadíssimas.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan class=\"interview01\"\u003e\u003cb\u003eComo esse efeito se relaciona e se retroalimenta com outras questões, como o racismo e urbanização precária?\u003c/b\u003e\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan class=\"interview02\"\u003e\u003cb\u003eKauê Lopes dos Santos \u003c/b\u003e\u003c/span\u003e\u003cspan style=\"font-weight: 400;\"\u003eSou formado numa tradição de geografia urbana que negligenciou a questão racial no debate, ainda que a questão racial estruture as classes no Brasil, não o contrário.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eNa primeira parte do livro, tive a preocupação de tentar construir uma leitura dessa periferia a partir da dimensão racial. Entender que esses sujeitos na periferia – que têm menos acesso à renda, à oportunidade de emprego de qualidade, ao saneamento básico e à habitação de qualidade – são majoritariamente pretos e pardos.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eHá diferentes linhas que articulam o crédito, o endividamento e a questão racial. Uma delas, exemplificada pelo trabalho do advogado e pesquisador Thiago Amparo, afirma que existe um racismo creditício. Amparo discute estratégias de mesa de crédito e como a leitura desse sujeito precarizado pode entrar nessa discussão.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eIsso acontece porque, no fim das contas, os sujeitos mais precarizados na cidade são sujeitos negros. Para o sistema de crédito, eles são aqueles que apresentam maiores riscos de inadimplência e insolvência. Portanto, esse risco acaba sendo traduzido em taxas de juros mais altas.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eUma matéria recente do jornal Valor Econômico apontou que as mulheres negras são as que \u003c/span\u003e\u003ca href=\"https://valor.globo.com/financas/noticia/2026/04/13/mulheres-negras-de-baixa-renda-pagam-juros-mais-altos-em-emprstimos-mostra-relatrio-do-bc.ghtml\" target=\"_blank\" rel=\"noopener\"\u003e\u003cspan style=\"font-weight: 400;\"\u003emais sofrem\u003c/span\u003e\u003c/a\u003e\u003cspan style=\"font-weight: 400;\"\u003e com taxas de juros altas. Há um argumento de que “não é porque elas são negras”. Mas também é porque elas são negras, porque a sociedade se estrutura racialmente. A classe é informada pela raça, majoritariamente.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eO que tentei trazer na minha pesquisa é a retomada do sociólogo Carlos Hasenbalg, que aborda o “ciclo cumulativo de desvantagens” do negro no Brasil. Essa tese afirma que o sujeito negro está numa sociedade racialmente estruturada, hierarquicamente racista. Logo, ele está sempre sofrendo algum tipo de desvantagem, seja em função de um racismo institucionalizado ou não.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eProcuro defender no livro que o endividamento crônico — que aliena o futuro e dificulta a mobilidade social do sujeito — entra como uma nova variável para essas populações negras nas periferias. A\u003c/span\u003e\u003cspan style=\"font-weight: 400;\"\u003elém do racismo institucional, há uma dificuldade de ascensão social ligada ao endividamento crônico. \u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eIsso porque indivíduos brancos, ainda que também possam vivenciar o endividamento crônico, não estão no campo do ciclo cumulativo de desvantagens. É importante que o sujeito negro na periferia consiga consumir, mas, no caso dele, a condição de endividamento estará associada a uma precarização do trabalho, por exemplo.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan class=\"interview01\"\u003e\u003cb\u003eComo o sr. avalia os efeitos dessa lógica de consumo sobre as famílias que entrevistou? Quais as percepções?\u003c/b\u003e\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan class=\"interview02\"\u003e\u003cb\u003eKauê Lopes dos Santos \u003c/b\u003e\u003c/span\u003e\u003cspan style=\"font-weight: 400;\"\u003eAo longo do tempo, fui percebendo uma espécie de absorção dessa cronicidade, que se torna quase uma variável fixa na organização do orçamento e estimula o aumento da informalidade em muitos casos.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eMuitas vezes, para pagar as parcelas de coisas que são importantes socialmente para uma pessoa, como uma nova televisão, ela precisa ampliar a atuação no campo da informalidade – trabalhando como motorista de aplicativo ou vendendo bolos, por exemplo.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eJá no caso do emprego formal, o sujeito começa a triplicar a jornada de trabalho, ou a trabalhar no fim de semana, para complementar a renda.  Isso gera uma periferia de trabalhadores exaustos.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eEssa situação ganha novos contornos hoje. Uma pessoa pode ter 24 ou 48 meses de vida comprometidos pelo endividamento. Ela, então, encontra duas saídas: ou aumentar a jornada de trabalho ou começar a \u003c/span\u003e\u003ca href=\"https://www.nexojornal.com.br/podcast/2024/07/03/jogo-do-tigrinho-polemicas\" target=\"_blank\" rel=\"noopener\"\u003e\u003cspan style=\"font-weight: 400;\"\u003ejogar no “tigrinho”\u003c/span\u003e\u003c/a\u003e\u003cspan style=\"font-weight: 400;\"\u003e. Mas logo percebe que isso, além de viciar, gera perda de dinheiro; então a alternativa será entrar no cheque especial, entrar nas outras modalidades de crédito para resolver aquela situação momentânea, que, na verdade, não é momentânea.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan class=\"interview01\"\u003e\u003cb\u003eÉ possível alterar essa lógica, favorecendo o poder aquisitivo e reduzindo efeitos colaterais? Quanto disso cabe às próprias famílias e quanto cabe aos setores econômicos ou ao próprio governo?\u003c/b\u003e\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan class=\"interview02\"\u003e\u003cb\u003eKauê Lopes dos Santos \u003c/b\u003e\u003c/span\u003e\u003cspan style=\"font-weight: 400;\"\u003eAcho que temos que pensar nas lógicas de curto, médio e longo prazo. Essas duas últimas exigem que pensemos em como queremos viver em sociedade.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003ePara o curto prazo, podemos pensar em duas estratégias: redução de taxas de juros e educação financeira nas escolas. Mas isso precisa ser endereçado como uma questão de curto prazo. O governo tem pensado nas políticas do Desenrola 1, talvez Desenrola 2, como estratégias pontuais, mas elas não resolvem. Tanto que, do último Desenrola até agora, 9 milhões de brasileiros \u003c/span\u003e\u003ca href=\"https://www.cnnbrasil.com.br/economia/macroeconomia/brasil-registrou-9-milhoes-de-novos-inadimplentes-apos-fim-do-desenrola/\" target=\"_blank\" rel=\"noopener\"\u003e\u003cspan style=\"font-weight: 400;\"\u003evoltaram\u003c/span\u003e\u003c/a\u003e\u003cspan style=\"font-weight: 400;\"\u003e à situação de inadimplência.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eNo campo da educação financeira, nós precisamos explicar o sistema financeiro, o sistema de juros. É preciso informar a sociedade sobre como o sistema financeiro nacional opera, senão, a questão recai nas atitudes individuais de uma pessoa que “precisa aprender a controlar seus gastos”. É preciso entender que os indivíduos estão pagando taxas de juros abusivas e a cada ano o sistema financeiro bate recordes.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003ePara situações de médio e longo prazo, precisamos pensar na questão da publicidade e da obsolescência programada. Esse último ponto pode ser redimensionado legislativamente em função de pensar o tempo da garantia do objeto, ou em termos do design do objeto.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan class=\"interview01\"\u003e\u003cb\u003eMas dentro do contexto eleitoral e uma preocupação com a questão do endividamento, o governo tem sinalizado que vai apostar justamente em uma nova versão do Desenrola. Na sua avaliação, isso seria positivo? \u003c/b\u003e\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan class=\"interview02\"\u003e\u003cb\u003eKauê Lopes dos Santos \u003c/b\u003e\u003c/span\u003e\u003cspan style=\"font-weight: 400;\"\u003eAcredito que é positivo como uma maneira de resolver o problema das famílias. Não podemos perder de vista que essa política objetivamente vai melhorar a vida do sujeito na periferia, de baixa renda.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eEu poderia falar que esse programa não adianta, porque, na verdade, o problema estrutural é um fluxo de dívida, o endividamento é crônico e vai seguir, mas não podemos ignorar o agora.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eQuando você resolve o problema no Desenrola, há a garantia da volta desse sujeito ao mercado de consumo e ao mercado de crédito. A situação é resolvida pontualmente, não estruturalmente.\u003c/span\u003e\u003c/p\u003e\n\u003cdiv id=\"code-type\"\u003e\u003ciframe src=\"https://graficos-2.s3.sa-east-1.amazonaws.com/assets/pebio/pebio-feira-livro.html\" width=\"100%\" height=\"110\" frameborder=\"0\" scrolling=\"no\" style=\"display:block;border:none;\"\u003e\u003c/iframe\u003e\u003c/div\u003e\n","date":"2026//04/19","id":366956,"sections":[{"isPrimary":tru
