n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-e81585bb9a6b8f4d.js" defer=""></script><script src="/_next/static/chunks/framework-ce84985cd166733a.js" defer=""></script><script src="/_next/static/chunks/main-67932eac35ae34b5.js" defer=""></script><script src="/_next/static/chunks/pages/_app-7dc037d1e01e65e5.js" defer=""></script><script src="/_next/static/chunks/bd1a647f-ad81fe9474f765da.js" defer=""></script><script src="/_next/static/chunks/0c428ae2-271746984c9e1da0.js" defer=""></script><script src="/_next/static/chunks/252f366e-0847d6fc7b39d007.js" defer=""></script><script src="/_next/static/chunks/1bfc9850-44b78148356b13fb.js" defer=""></script><script src="/_next/static/chunks/d0c16330-a51c65102d074733.js" defer=""></script><script src="/_next/static/chunks/5857-3b254c5774adefb6.js" defer=""></script><script src="/_next/static/chunks/9567-d86940e6afc640a0.js" defer=""></script><script src="/_next/static/chunks/5675-1143b4e05607e631.js" defer=""></script><script src="/_next/static/chunks/6154-f1f182305c65b389.js" defer=""></script><script src="/_next/static/chunks/9788-e47e615f690f1d69.js" defer=""></script><script src="/_next/static/chunks/9207-f50fa2e4a9da4513.js" defer=""></script><script src="/_next/static/chunks/9816-68851a1d6b8de71b.js" defer=""></script><script src="/_next/static/chunks/4285-d84657678bc8056f.js" defer=""></script><script src="/_next/static/chunks/3519-fca66eeb1f03611b.js" defer=""></script><script src="/_next/static/chunks/7357-ce87da47b55de4b4.js" defer=""></script><script src="/_next/static/chunks/pages/%5B...post%5D-a6a6dbcccd3b63b3.js" defer=""></script><script src="/_next/static/SC0EeEmt7-89wHZwcQgHS/_buildManifest.js" defer=""></script><script src="/_next/static/SC0EeEmt7-89wHZwcQgHS/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"post":{"quiz":null,"status":"publish","academic":null,"author":"Giovanna Castro","content":"\u003cdiv id=\"attachment_368146\" style=\"width: 610px\" class=\"wp-caption alignnone\"\u003e\u003cimg fetchpriority=\"high\" decoding=\"async\" aria-describedby=\"caption-attachment-368146\" class=\"size-large wp-image-368146\" src=\"https://nexo-uploads-beta.s3.amazonaws.com/wp-content/uploads/images/2026/04/andrey-metelev-eG_Co1EGUyI-unsplash-600x400.webp\" alt=\"Livros empilhados\" width=\"600\" height=\"400\" data-agency=\"Unsplash\" data-photographer=\"Andrey Metelev\" data-url-landscape-640=\"https://nexo-uploads-beta.s3.amazonaws.com/wp-content/uploads/images/2026/04/andrey-metelev-eG_Co1EGUyI-unsplash-640x399.webp\" srcset=\"https://nexo-uploads-beta.s3.amazonaws.com/wp-content/uploads/images/2026/04/andrey-metelev-eG_Co1EGUyI-unsplash-600x400.webp 600w, https://nexo-uploads-beta.s3.amazonaws.com/wp-content/uploads/images/2026/04/andrey-metelev-eG_Co1EGUyI-unsplash-249x166.webp 249w, https://nexo-uploads-beta.s3.amazonaws.com/wp-content/uploads/images/2026/04/andrey-metelev-eG_Co1EGUyI-unsplash-768x512.webp 768w, https://nexo-uploads-beta.s3.amazonaws.com/wp-content/uploads/images/2026/04/andrey-metelev-eG_Co1EGUyI-unsplash-1536x1024.webp 1536w, https://nexo-uploads-beta.s3.amazonaws.com/wp-content/uploads/images/2026/04/andrey-metelev-eG_Co1EGUyI-unsplash-2048x1365.webp 2048w\" sizes=\"(max-width: 600px) 100vw, 600px\" /\u003e\u003cp id=\"caption-attachment-368146\" class=\"wp-caption-text\"\u003eLivros empilhados\u003c/p\u003e\u003c/div\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eEscrever uma biografia é um processo que envolve muitas etapas, e que pode ser encarado de diferentes formas. Não há um conjunto pré-estabelecido de regras que deva ser seguido.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eBianca Santana, autora de “Continuo preta: a vida de Sueli Carneiro” (2021), biografou uma das principais intelectuais públicas brasileiras, mas a ideia inicial do livro não era uma biografia. Tornou-se uma conforme as entrevistas aconteciam.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eJá João Pombo Barile, autor de “Presente do acaso – um ensaio biográfico sobre Silviano Santiago” (2025), passou anos entre o desejo de escrever um livro e a escolha de quem iria biografar. Acabou optando por Santiago, professor, crítico e romancista. \u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003ePor fim, Adriana Negreiros, que escreveu sobre a cangaceira Maria Bonita em “Maria Bonita: Sexo, violência e mulheres no cangaço” (2018) e a atriz Dercy Gonçalves em “Dercy: A diva debochada” (2026), viu-se cada vez mais envolvida na vida das mulheres que escrevia, apesar do princípio ético jornalístico de distância das fontes.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eOs três escritores e jornalistas estarão presentes na quinta edição d’A Feira do Livro, festival literário que acontece em São Paulo entre 30 de maio e 7 de junho, que terá \u003c/span\u003e\u003ca href=\"https://www.nexojornal.com.br/expresso/2026/04/17/a-feira-do-livro-2026-cobertura-nexo-jornal\" target=\"_blank\" rel=\"noopener\"\u003e\u003cspan style=\"font-weight: 400;\"\u003ecobertura especial\u003c/span\u003e\u003c/a\u003e\u003cspan style=\"font-weight: 400;\"\u003e do \u003c/span\u003e\u003cb\u003eNexo\u003c/b\u003e\u003cspan style=\"font-weight: 400;\"\u003e. Ao jornal, eles falaram sobre as dificuldades em escrever biografias, como foram suas trajetórias no gênero e de que maneira imprimiram às obras suas próprias histórias de vida.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan class=\"commas01\" style=\"font-weight: 400;\"\u003e“A biografia tem a intenção de narrar a verdade, mas a vida de uma pessoa não é só objetiva”\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan class=\"commas02\"\u003e\u003cb\u003eBianca Santana\u003c/b\u003e\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan class=\"commas03\" style=\"font-weight: 400;\"\u003eautora de “Continuo preta: a vida de Sueli Carneiro” (2021)\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003e“Eu nunca tinha escrito uma biografia antes de ‘Continuo preta’. Já tinha escrito perfis biográficos no jornalismo e estudado como escrevê-los. Mas minha ideia inicial não era fazer um perfil da Sueli, e sim uma espécie de biografia conjunta entre nós duas, porque é muito difícil escrever a biografia de uma pessoa viva e ativa.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eComecei a entrevistar a Sueli, mas eu tinha muita vontade de ouvir as pessoas que ela citava, de ampliar o contexto histórico. Eventualmente, comecei a ouvir mais pessoas, a buscar novas informações e a fazer viagens para onde a família dela nasceu. Nessa hora, tive que assumir que eu realmente ia escrever uma biografia.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eAo escrever, demorei para entender que eu precisava fazer um recorte temporal. \u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eNum primeiro momento, achei que o texto não seria temporalmente linear. Eu definia temas ou eixos que entendia que podiam ser capítulos. Mas isso mudou quando um editor leu e entendeu que organizar cronologicamente ajudaria o leitor e também a mim na hora de olhar para toda a pesquisa que eu tinha feito.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eDecidi que a última cena do livro seria em 2012, porque foi o \u003c/span\u003e\u003ca href=\"https://g1.globo.com/educacao/noticia/2012/04/stf-decide-por-unanimidade-pela-constitucionalidade-das-cotas-raciais.html\" target=\"_blank\" rel=\"noopener\"\u003e\u003cspan style=\"font-weight: 400;\"\u003ejulgamento da constitucionalidade\u003c/span\u003e\u003c/a\u003e\u003cspan style=\"font-weight: 400;\"\u003e das cotas raciais pelo STF (Supremo Tribunal Federal). Estabeleci esse marco porque era como se ele organizasse uma vitória coletiva muito grande pela qual a Sueli lutou.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eHá muito cuidado ao narrar a história. No caso da Sueli, por exemplo, eu suprimi dois capítulos que já estavam escritos, mas que eram histórias difíceis para ela e que poderiam trazer algum constrangimento em vida. Nessas horas, você coloca na balança o constrangimento de uma pessoa em relação ao peso daquela informação na esfera pública.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eA biografia tem a intenção de narrar a verdade, mas a vida de uma pessoa não é só objetiva. O meu olhar está marcado nesse livro. Uma biografia é a vida de uma pessoa a partir do olhar de outra feita em determinado momento, por isso tem assinatura e data.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eA escrita da biografia, na minha leitura, pressupõe um rigor jornalístico. Por ser um livro de não ficção, é um gênero rigoroso. Ao mesmo tempo, é um texto de fôlego. Você precisa narrar a história de maneira interessante para as pessoas. Então foi desafiador para mim tanto o processo de apuração, quanto de checagem e de escrita.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eEscrever um texto biográfico é um desafio. No meu caso, eu fiquei tomada por esse projeto. Foi como se durante três anos da minha vida eu nem ocupasse direito meu corpo, apesar de estar nele.”\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan class=\"commas01\" style=\"font-weight: 400;\"\u003e“Queria estar o mínimo possível no livro”\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan class=\"commas02\"\u003e\u003cb\u003eJoão Pombo Barile\u003c/b\u003e\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan class=\"commas03\" style=\"font-weight: 400;\"\u003eautor de “Presente do acaso – Um ensaio biográfico sobre Silviano Santiago” (2025)\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003e“Esta é a primeira vez que me atrevo a escrever um texto biográfico, que sempre acreditei que desse muito trabalho, porque acho que você precisa conhecer muito a obra de uma pessoa para se aventurar a fazer algo assim.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eEu tinha uma ideia muito genérica de como seria o livro. Sempre quis escrever sobre a relação entre jornalismo e escritores aqui em Minas Gerais. O Silviano me incentivava a conversar com os escritores Autran Dourado e o Ezequiel Neves (Zeca), amigos dele, mas eles ficaram doentes.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eDurante mais de 15 anos, nada aconteceu. Até que o Silviano publicou ‘Mil rosas roubadas’ (2014), que conta a história do Zeca. Ele me desafiou a escrever um livro e comecei a abordar a história do Silviano, que além de ser meu amigo era um personagem muito interessante de se escrever.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eSempre gostei de um narrador que se envolve o mínimo possível, mas o Silviano não aceitava isso. Ele dizia que eu tinha de aparecer no livro e que era impossível escrever sem que minha presença estivesse nele. Esse embate entre nós está marcado no livro e definiu o tom dele.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eUm dos desafios para mim era fazer um livro que não fosse chato, que tivesse uma linguagem que fluísse o máximo possível. Também precisava escolher um tom para o livro que tivesse a ver com o Silviano.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eAo escrever, priorizei especialmente Belo Horizonte, uma cidade que é deixada de lado muitas vezes – porque a cultura no Brasil pensa muito no eixo Rio-São Paulo – e que foi palco de situações muito interessantes nos anos 1950 vividas pela geração do Silviano.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eNão queria que o livro fosse focado em suas experiências como professor, então foquei nas outras faces dele. Mas também sabia que não seria possível colocar tudo sobre ele, porque ele é um sujeito extremamente trabalhador até hoje.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003ePesquisei muito para escrever o livro, mas a vida não é certinha. Ao escrever, ficou muito claro para mim que os limites entre o que é ficcional e o que é reportagem são muito tênues.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eNo final, o livro era uma tentativa de fazer uma homenagem a ele, que completa 90 anos em 2026. Eu achava que era preciso fazer um livro que pudesse conversar com novas gerações.”\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan class=\"commas01\" style=\"font-weight: 400;\"\u003e“Se pudesse, faria só isso: mergulhar e viver uma vida completamente diferente da minha”\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan class=\"commas02\"\u003e\u003cb\u003eAdriana Negreiros\u003c/b\u003e\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan class=\"commas03\" style=\"font-weight: 400;\"\u003eautora de “Maria Bonita: sexo, violência e mulheres no cangaço” (2018) e de “Dercy: a diva debochada” (2026)\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003e“Quando vou escrever biografias, sigo mais ou menos o método que aplico nas reportagens. Primeiro, tento ler tudo que consigo encontrar que foi publicado a respeito do personagem que será biografado e do seu entorno. Depois, faço pesquisas sobre o assunto em jornais e na imprensa. Por último, faço entrevistas.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eA partir disso, começo a escrever em ordem cronológica. Separo os capítulos por anos e refino a pesquisa tendo essa divisão como base. Ao mesmo tempo, começo a escrever. O processo de escrita é simultâneo ao da pesquisa. Procuro checar as informações e não me deixar levar pela mitologia em torno das personagens biografadas, pelo poder de atração da lenda.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eAcredito que uma biografia não é apenas sobre o personagem. Ela reflete quem a escreve, por isso não há biografias definitivas. A vida do escritor e o momento em que ele escreve influenciam as escolhas na hora de contar essas histórias.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eA Maria Bonita, por exemplo, era sempre narrada de maneira heróica, quase caricata, e principalmente por homens, que não relatavam os dramas relacionados a ser uma mulher. No cangaço, as mulheres tinham que doar seus bebês quando eles nasciam e a violência sexual era imperativa.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eAcredito que o meu destaque a essas questões no livro tem relação com o fato de eu ser mulher, mãe e de ter vivido uma violência sexual. \u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eA biografia foge de um princípio ético dos jornalistas que é o de não ter uma relação afetiva para com as pessoas sobre as quais se escreve. Mas na biografia há uma relação quase promíscua entre biógrafo e biografado, porque você passa a conviver com aquela pessoa na intimidade, busca compreendê-la e se afeiçoa a ela.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eNo caso da Dercy, eu assistia aos filmes, aos vários vídeos. A voz dela ficava ecoando no meu ouvido, eu lembrava dos gestos. Foi fascinante mergulhar na vida dela e, por mais que seja um trabalho exaustivo, não me ressinto. Se pudesse, faria só isso: mergulhar e viver uma vida completamente diferente da minha.”\u003c/span\u003e\u003c/p\u003e\n\u003cdiv id=\"code-type\"\u003e\u003ciframe src=\"https://graficos-2.s3.sa-east-1.amazonaws.com/assets/pebio/pebio-feira-livro.html\" width=\"100%\" height=\"110\" frameborder=\"0\" scrolling=\"no\" style=\"display:block;border:none;\"\u003e\u003c/iframe\u003e\u003c/div\u003e\n","createdAt":"01 de maio de 2026","featuredImage":{"node":{"debateCover":"https://nexo-uploads-beta.s3.amazonaws.com/wp-content/uploads/images/2026/04/andrey-metelev-eG_Co1EGUyI-unsplash-1920x580.webp","squareImage":"https://nexo-uploads-beta.s3.amazonaws.com/wp-content/uploads/images/2026/04/andrey-metelev-eG_Co1EGUyI-unsplash-640x640.webp","landscape640":"https://nexo-uploads-beta.s3.amazonaws.com/wp-content/uploads/images/2026/04/andrey-metelev-eG_Co1EGUyI-unsplash-640x399.webp","src":"https://nexo-uploads-beta.s3.amazonaws.com/wp-content/uploads/images/2026/04/andrey-metelev-eG_Co1EGUyI-unsplash-scaled.webp","caption":"\u003cp\u003eLivros empilhados\u003c/p\u003e\n","mediaDetails":{"sizes":[{"sourceUrl":"https://nexo-uploads-beta.s3.amazonaws.com/wp-content/uploads/images/2026/04/andrey-metelev-eG_Co1EGUyI-unsplash-249x166.webp","height":"166","mimeType":"image/webp","width":"249","name":"medium","__typename":"MediaSize"},{"sourceUrl":"https://nexo-uploads-beta.s3.amazonaws.com/wp-content/uploads/images/2026/04/andrey-metelev-eG_Co1EGUyI-unsplash-600x400.webp","height":"400","mimeType":"image/webp","width":"600","name":"large","__typename":"MediaSize"},{"sourceUrl":"https://nexo-uploads-beta.s3.amazonaws.com/wp-content/uploads/images/2026/04/andrey-metelev-eG_Co1EGUyI-unsplash-150x150.webp","height":"150","mimeType":"image/webp","width":"150","name":"thumbnail","__typ
