name: publish

on:
  workflow_dispatch:
  push:
    tags:
      - "*"
permissions:
  id-token: write
  contents: read

jobs:
  npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
      - run: npm install --legacy-peer-deps
      - run: npm publish --provenance --access public
